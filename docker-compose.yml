version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: pet_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-pet_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pet_password}
      POSTGRES_DB: ${DB_NAME:-pet_platform_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: pet_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-password123}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  pgdata:
  minio_data:
